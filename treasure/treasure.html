<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Treasure 💰 Shares</h1>
    <form class="form-grid">
        <label for="input-number-of-treasure">How much treasure?</label>
        <input class="input-number" id="input-number-of-treasure" type="number">
        <label for="input-number-of-pcs">How many PCs?</label>
        <input class="input-number" id="input-number-of-pcs" type="number">
        <label for="input-number-of-hirelings">How many hirelings?</label>
        <input class="input-number" id="input-number-of-hirelings" type="number">
    </form>
    <br>
    <button id="btn-divide-treasure">Divide Treasure</button>
    <p id="display-treasure-distribution"></p>
    
    <script src="script.js"></script>
</body>
</html>
